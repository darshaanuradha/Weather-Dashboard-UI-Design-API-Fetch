<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Bento Weather</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.03)',
                        glassHover: 'rgba(255, 255, 255, 0.08)',
                        glassBorder: 'rgba(255, 255, 255, 0.05)',
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Mesh Gradient Background */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(56, 189, 248, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(76, 29, 149, 0.4) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(15, 23, 42, 1) 0px, transparent 50%);
            filter: blur(60px);
            opacity: 0.8;
            animation: gradient-shift 15s ease-in-out infinite alternate;
        }

        @keyframes gradient-shift {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Premium Glassmorphism */
        .bento-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .bento-card:hover {
            border-color: rgba(255,255,255,0.2);
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
        }

        /* Progress Bar Animation */
        .progress-ring__circle {
            transition: stroke-dashoffset 1.5s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Staggered Reveal Animation */
        .reveal-element {
            opacity: 0;
            transform: translateY(30px);
            animation: revealFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes revealFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide scrollbar but keep functionality */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center justify-center font-sans antialiased selection:bg-cyan-500/30">

    <div class="bg-mesh"></div>

    <div class="w-full max-w-5xl z-10 flex flex-col gap-6">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 reveal-element" style="animation-delay: 0ms;">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <i class="fa-solid fa-bolt text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-white">Nimbus<span class="text-cyan-400 font-light">Cast</span></h1>
                    <p class="text-xs text-slate-400 font-medium tracking-wide uppercase" id="current-date">Loading date...</p>
                </div>
            </div>

            <div class="w-full md:w-96 relative group z-20">
                <input 
                    type="text" 
                    id="search-input"
                    placeholder="Search city..." 
                    class="w-full bg-slate-900/50 backdrop-blur-md border border-slate-700/50 rounded-2xl py-3.5 pl-12 pr-12 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all shadow-inner"
                    autocomplete="off"
                >
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-cyan-400 transition-colors"></i>
                <button id="search-btn" class="absolute right-2 top-1/2 -translate-y-1/2 bg-slate-800 hover:bg-cyan-500 text-slate-300 hover:text-white rounded-xl w-8 h-8 flex items-center justify-center transition-all duration-300">
                    <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </div>
        </header>

        <div id="error-message" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-2xl text-sm text-center backdrop-blur-md transition-all">
            <i class="fa-solid fa-triangle-exclamation mr-2"></i>Location not found. Please try again.
        </div>

        <main class="grid grid-cols-1 md:grid-cols-4 md:grid-rows-3 gap-4 md:gap-6 w-full" id="dashboard-content">
            
            <div class="bento-card md:col-span-2 md:row-span-2 p-8 flex flex-col justify-between relative overflow-hidden reveal-element tilt-effect" style="animation-delay: 100ms;">
                <div class="absolute -top-24 -right-24 w-64 h-64 bg-cyan-500/20 rounded-full blur-[80px]"></div>
                
                <div class="flex justify-between items-start z-10">
                    <div>
                        <h2 class="text-4xl font-extrabold tracking-tight text-white mb-1" id="city-name">--</h2>
                        <div class="flex items-center gap-2 text-slate-300 text-sm font-medium bg-slate-800/40 w-fit px-3 py-1 rounded-full border border-slate-700/50">
                            <i class="fa-solid fa-map-pin text-cyan-400"></i>
                            <span id="country-name">--</span>
                        </div>
                    </div>
                    <img id="weather-icon" src="" alt="Weather" class="w-32 h-32 object-contain drop-shadow-[0_0_25px_rgba(255,255,255,0.2)] animate-float hidden">
                </div>

                <div class="mt-8 z-10">
                    <div class="flex items-start gap-1">
                        <span class="text-7xl md:text-8xl font-black tracking-tighter" id="temperature">0</span>
                        <span class="text-3xl text-cyan-400 mt-2 font-bold">°C</span>
                    </div>
                    <div class="mt-2 flex items-center gap-3">
                        <p class="text-xl capitalize text-white font-medium tracking-wide" id="weather-desc">--</p>
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                        <p class="text-sm text-slate-400 font-medium">Feels like <span id="feels-like" class="text-white">0°</span></p>
                    </div>
                </div>
            </div>

            <div class="bento-card p-6 flex flex-col justify-between reveal-element tilt-effect group" style="animation-delay: 200ms;">
                <div class="flex justify-between items-center text-slate-400 mb-2">
                    <span class="text-sm font-semibold uppercase tracking-wider text-slate-400">Wind</span>
                    <i class="fa-solid fa-wind text-slate-500 group-hover:text-cyan-400 transition-colors"></i>
                </div>
                <div>
                    <div class="flex items-end gap-1 mb-2">
                        <span class="text-4xl font-bold text-white counter" id="wind-speed">0</span>
                        <span class="text-sm text-slate-400 mb-1 font-medium">m/s</span>
                    </div>
                    <div class="flex items-center gap-2 text-sm text-slate-300 font-medium">
                        <div class="w-8 h-8 rounded-full bg-slate-800/80 border border-slate-700/50 flex items-center justify-center">
                            <i id="wind-arrow" class="fa-solid fa-location-arrow text-cyan-400 text-xs transition-transform duration-1000"></i>
                        </div>
                        <span id="wind-deg">0°</span>
                    </div>
                </div>
            </div>

            <div class="bento-card p-6 flex flex-col items-center justify-center relative reveal-element tilt-effect" style="animation-delay: 300ms;">
                <span class="absolute top-6 left-6 text-sm font-semibold uppercase tracking-wider text-slate-400">Humidity</span>
                <div class="relative w-28 h-28 mt-4 flex items-center justify-center">
                    <svg class="w-full h-full" viewBox="0 0 100 100">
                        <circle class="text-slate-800 stroke-current" stroke-width="8" cx="50" cy="50" r="40" fill="transparent"></circle>
                        <circle id="humidity-ring" class="text-cyan-400 progress-ring__circle stroke-current" stroke-width="8" stroke-linecap="round" cx="50" cy="50" r="40" fill="transparent" stroke-dasharray="251.2" stroke-dashoffset="251.2"></circle>
                    </svg>
                    <div class="absolute flex flex-col items-center">
                        <span class="text-2xl font-bold text-white"><span id="humidity" class="counter">0</span>%</span>
                    </div>
                </div>
            </div>

            <div class="bento-card p-6 flex flex-col justify-between reveal-element tilt-effect group" style="animation-delay: 400ms;">
                <div class="flex justify-between items-center text-slate-400 mb-2">
                    <span class="text-sm font-semibold uppercase tracking-wider text-slate-400">Pressure</span>
                    <i class="fa-solid fa-water text-slate-500 group-hover:text-cyan-400 transition-colors"></i>
                </div>
                <div>
                    <div class="flex items-end gap-1">
                        <span class="text-4xl font-bold text-white counter" id="pressure">0</span>
                        <span class="text-sm text-slate-400 mb-1 font-medium">hPa</span>
                    </div>
                    <div class="mt-4 h-2 w-full bg-slate-800/80 rounded-full overflow-hidden border border-slate-700/50">
                        <div class="h-full bg-gradient-to-r from-cyan-500 to-blue-500 w-[70%] rounded-full animate-pulse-slow"></div>
                    </div>
                </div>
            </div>

            <div class="bento-card p-6 flex flex-col justify-between reveal-element tilt-effect group" style="animation-delay: 500ms;">
                <div class="flex justify-between items-center text-slate-400 mb-2">
                    <span class="text-sm font-semibold uppercase tracking-wider text-slate-400">Visibility</span>
                    <i class="fa-regular fa-eye text-slate-500 group-hover:text-cyan-400 transition-colors"></i>
                </div>
                <div>
                    <div class="flex items-end gap-1">
                        <span class="text-4xl font-bold text-white counter" id="visibility">0</span>
                        <span class="text-sm text-slate-400 mb-1 font-medium">km</span>
                    </div>
                    <p class="text-sm text-slate-300 font-medium mt-2 bg-slate-800/40 w-fit px-3 py-1 rounded-lg border border-slate-700/50" id="visibility-desc">Calculating...</p>
                </div>
            </div>

            <div class="bento-card md:col-span-2 p-6 flex flex-col justify-center reveal-element tilt-effect" style="animation-delay: 600ms;">
                <span class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-4 block">Sun Cycle</span>
                
                <div class="flex items-center justify-between relative px-2">
                    <div class="absolute top-1/2 left-8 right-8 h-[2px] bg-slate-800 -z-10 -translate-y-1/2 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-amber-400 via-orange-400 to-indigo-400 w-full opacity-50"></div>
                    </div>

                    <div class="flex flex-col items-center gap-2 bg-[#0f172a] p-2 rounded-xl">
                        <div class="w-10 h-10 rounded-full bg-amber-500/20 border border-amber-500/30 flex items-center justify-center text-amber-400 shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                            <i class="fa-solid fa-sun"></i>
                        </div>
                        <div class="text-center">
                            <p class="text-lg font-bold text-white" id="sunrise">--:--</p>
                            <p class="text-xs text-slate-400 font-medium">Sunrise</p>
                        </div>
                    </div>

                    <div class="w-4 h-4 rounded-full bg-white shadow-[0_0_10px_rgba(255,255,255,0.8)] border-2 border-slate-900 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 animate-pulse"></div>

                    <div class="flex flex-col items-center gap-2 bg-[#0f172a] p-2 rounded-xl">
                        <div class="w-10 h-10 rounded-full bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center text-indigo-400 shadow-[0_0_15px_rgba(99,102,241,0.2)]">
                            <i class="fa-solid fa-moon"></i>
                        </div>
                        <div class="text-center">
                            <p class="text-lg font-bold text-white" id="sunset">--:--</p>
                            <p class="text-xs text-slate-400 font-medium">Sunset</p>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const API_KEY = 'f4f69c47da7ff787ad8c3349ffa41cfa';
        // Using Katugastota based on current location context
        const DEFAULT_CITY = 'Katugastota';

        // DOM Elements
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const errorMsg = document.getElementById('error-message');
        const weatherIcon = document.getElementById('weather-icon');

        // Setup Date
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', dateOptions);

        // --- 3D Tilt Effect Animation ---
        document.querySelectorAll('.tilt-effect').forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const tiltX = ((y - centerY) / centerY) * -5; // Max tilt 5 deg
                const tiltY = ((x - centerX) / centerX) * 5;
                
                card.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.02, 1.02, 1.02)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        });

        // --- Number Counter Animation ---
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Ease out cubic
                const easeOut = 1 - Math.pow(1 - progress, 3);
                
                let currentVal = progress === 1 ? end : start + (end - start) * easeOut;
                
                // Keep 1 decimal for specific elements, integers for others
                if(obj.id === 'wind-speed' || obj.id === 'visibility') {
                    obj.innerHTML = currentVal.toFixed(1);
                } else {
                    obj.innerHTML = Math.floor(currentVal);
                }
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // --- Fetch Data ---
        async function fetchWeather(city) {
            try {
                errorMsg.classList.add('hidden');
                
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`);
                if (!res.ok) throw new Error('City not found');
                
                const data = await res.json();
                updateDashboard(data);
            } catch (error) {
                console.error(error);
                errorMsg.classList.remove('hidden');
                // Shake animation on error
                errorMsg.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 400, iterations: 1 });
            }
        }

        // --- Update UI ---
        function updateDashboard(data) {
            // Text updates
            document.getElementById('city-name').textContent = data.name;
            document.getElementById('country-name').textContent = data.sys.country;
            document.getElementById('weather-desc').textContent = data.weather[0].description;
            
            // Icon
            weatherIcon.src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png`;
            weatherIcon.classList.remove('hidden');

            // Animated Number Updates
            animateValue(document.getElementById('temperature'), 0, data.main.temp, 1500);
            animateValue(document.getElementById('feels-like'), 0, data.main.feels_like, 1500);
            animateValue(document.getElementById('wind-speed'), 0, data.wind.speed, 1500);
            animateValue(document.getElementById('pressure'), 800, data.main.pressure, 1500);
            
            const visKm = data.visibility / 1000;
            animateValue(document.getElementById('visibility'), 0, visKm, 1500);
            document.getElementById('visibility-desc').textContent = visKm > 8 ? "Excellent clear view" : visKm > 4 ? "Good visibility" : "Poor visibility";

            // Wind Direction
            const deg = data.wind.deg || 0;
            document.getElementById('wind-deg').textContent = `${deg}°`;
            // Subtract 45deg to align fontawesome icon correctly
            document.getElementById('wind-arrow').style.transform = `rotate(${deg - 45}deg)`;

            // Humidity Ring Animation
            const humidityVal = data.main.humidity;
            animateValue(document.getElementById('humidity'), 0, humidityVal, 1500);
            const ring = document.getElementById('humidity-ring');
            const circumference = 40 * 2 * Math.PI; // r=40
            const offset = circumference - (humidityVal / 100) * circumference;
            ring.style.strokeDashoffset = offset;

            // Time Formatting (Local to city)
            const formatTime = (timestamp, timezoneOffset) => {
                const date = new Date((timestamp + timezoneOffset) * 1000);
                return date.toUTCString().match(/(\d{2}:\d{2})/)[0];
            };
            document.getElementById('sunrise').textContent = formatTime(data.sys.sunrise, data.timezone);
            document.getElementById('sunset').textContent = formatTime(data.sys.sunset, data.timezone);
        }

        // --- Event Listeners ---
        searchBtn.addEventListener('click', () => {
            if (searchInput.value.trim()) fetchWeather(searchInput.value.trim());
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && searchInput.value.trim()) {
                fetchWeather(searchInput.value.trim());
                searchInput.blur(); // Remove focus after search
            }
        });

        // Initialize App
        fetchWeather(DEFAULT_CITY);

    </script>
</body>
</html>
